- name: Harden SSH
  hosts: homelab
  become: true
  tags: system

  tasks:
    - name: Write SSH hardening drop-in
      copy:
        dest: /etc/ssh/sshd_config.d/00-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          PasswordAuthentication no
          PermitRootLogin no
          PermitEmptyPasswords no
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
