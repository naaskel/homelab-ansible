- name: Setup fail2ban
  hosts: homelab
  become: true
  tags: packages

  tasks:
    - name: Install fail2ban
      apt:
        name: fail2ban
        state: present
        update_cache: true

    - name: Copy fail2ban config
      copy:
        src: ../../files/fail2ban/jail.local
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: Restart fail2ban

    - name: Start fail2ban
      service:
        name: fail2ban
        state: started
        enabled: true

  handlers:
    - name: Restart fail2ban
      service:
        name: fail2ban
        state: restarted
