- name: Setup Open WebUI
  hosts: homelab
  become: true
  tags: services

  vars:
    open_webui_dir: "/home/{{ ansible_user }}/ssd/open-webui"

  tasks:
    - name: Create Open WebUI directory
      file:
        path: "{{ open_webui_dir }}/data"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy compose file
      template:
        src: ../../templates/open-webui/compose.yml.j2
        dest: "{{ open_webui_dir }}/compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      notify: Restart Open WebUI

    - name: Start Open WebUI
      community.docker.docker_compose_v2:
        project_src: "{{ open_webui_dir }}"
        state: present

  handlers:
    - name: Restart Open WebUI
      community.docker.docker_compose_v2:
        project_src: "{{ open_webui_dir }}"
        state: restarted
